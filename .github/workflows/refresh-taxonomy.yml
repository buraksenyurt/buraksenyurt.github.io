name: Refresh Taxonomy

on:
  push:
    branches:
      - master
      - main
    paths:
      - _posts/**
      - scripts/build_taxonomy.rb
      - .github/workflows/refresh-taxonomy.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-taxonomy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Generate inferred taxonomy
        run: ruby scripts/build_taxonomy.rb

      - name: Detect taxonomy and category page changes
        id: taxonomy_changes
        run: |
          if git diff --quiet -- _data/inferred_taxonomy.json generated-pages/kategoriler; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated taxonomy artifacts
        if: steps.taxonomy_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/inferred_taxonomy.json generated-pages/kategoriler
          git commit -m "chore: refresh taxonomy artifacts"
          git push